- name: Install Microsoft GPG key
  ansible.builtin.shell:
    cmd: curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor -o /etc/apt/keyrings/packages.microsoft.gpg
    creates: /etc/apt/keyrings/packages.microsoft.gpg
  become: true

- name: Add VSCode apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64,arm64,armhf signed-by=/etc/apt/keyrings/packages.microsoft.gpg] https://packages.microsoft.com/repos/code stable main"
    state: present
    filename: vscode
  become: true

- name: Install VSCode
  ansible.builtin.apt:
    name: code
    state: present
    update_cache: true
  become: true

# The VSCode deb package post-install script creates this file, conflicting with vscode.list
- name: Remove VSCode auto-generated source file
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/vscode.sources
    state: absent
  become: true

- name: Install Brave GPG key
  ansible.builtin.shell:
    cmd: curl -fsSL https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg -o /etc/apt/keyrings/brave-browser-archive-keyring.gpg
    creates: /etc/apt/keyrings/brave-browser-archive-keyring.gpg
  become: true

- name: Add Brave apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/brave-browser-archive-keyring.gpg] https://brave-browser-apt-release.s3.brave.com/ stable main"
    state: present
    filename: brave-browser-release
  become: true

- name: Install Brave
  ansible.builtin.apt:
    name: brave-browser
    state: present
    update_cache: true
  become: true

- name: Install GitHub CLI GPG key
  ansible.builtin.shell:
    cmd: curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg -o /etc/apt/keyrings/githubcli-archive-keyring.gpg
    creates: /etc/apt/keyrings/githubcli-archive-keyring.gpg
  become: true

- name: Add GitHub CLI apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
    state: present
    filename: github-cli
  become: true

- name: Install GitHub CLI
  ansible.builtin.apt:
    name: gh
    state: present
    update_cache: true
  become: true

- name: Ensure VSCode user config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/Code/User"
    state: directory
    mode: "0755"

- name: Deploy VSCode settings
  ansible.builtin.copy:
    src: vscode_settings.json
    dest: "{{ ansible_env.HOME }}/.config/Code/User/settings.json"
    mode: "0644"

- name: Get installed VSCode extensions
  ansible.builtin.command:
    cmd: code --list-extensions
  register: installed_vscode_extensions
  changed_when: false

- name: Install VSCode extensions
  ansible.builtin.command:
    cmd: code --install-extension {{ item }}
  loop: "{{ vscode_extensions }}"
  when: item not in installed_vscode_extensions.stdout_lines

- name: Create Brave managed policies directory
  ansible.builtin.file:
    path: /etc/brave/policies/managed
    state: directory
    mode: "0755"
  become: true

- name: Configure Brave search policy
  ansible.builtin.copy:
    src: brave_search_policy.json
    dest: /etc/brave/policies/managed/search.json
    mode: "0644"
  become: true

- name: Configure Brave extensions policy
  ansible.builtin.template:
    src: brave_extensions.json.j2
    dest: /etc/brave/policies/managed/extensions.json
    mode: "0644"
  become: true

- name: Ensure NerdFonts directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/share/fonts/NerdFonts"
    state: directory
    mode: "0755"

- name: Install JetBrainsMono Nerd Font
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://github.com/ryanoasis/nerd-fonts/releases/download/v3.3.0/JetBrainsMono.zip \
        -o /tmp/JetBrainsMono.zip && \
      unzip -o /tmp/JetBrainsMono.zip -d {{ ansible_env.HOME }}/.local/share/fonts/NerdFonts && \
      rm /tmp/JetBrainsMono.zip && \
      fc-cache -f
    creates: "{{ ansible_env.HOME }}/.local/share/fonts/NerdFonts/JetBrainsMonoNerdFont-Regular.ttf"

- name: Ensure Alacritty config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/alacritty"
    state: directory
    mode: "0755"

- name: Deploy Alacritty config
  ansible.builtin.copy:
    src: alacritty.toml
    dest: "{{ ansible_env.HOME }}/.config/alacritty/alacritty.toml"
    mode: "0644"

- name: Install Claude Code CLI
  ansible.builtin.shell:
    cmd: curl -fsSL https://claude.ai/install.sh | bash
    creates: "{{ ansible_env.HOME }}/.local/bin/claude"
