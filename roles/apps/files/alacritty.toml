[env]
TERM = "xterm-256color"

[window]
opacity = 1
padding.x = 5
padding.y = 5
decorations = "None"
decorations_theme_variant = "Dark"
startup_mode = "Maximized"

[font]
normal.family = "JetBrainsMono Nerd Font"
normal.style = "Regular"
bold.family = "JetBrainsMono Nerd Font"
bold.style = "Bold"
italic.family = "JetBrainsMono Nerd Font"
italic.style = "Italic"
bold_italic.family = "JetBrainsMono Nerd Font"
size = 15.0

[cursor]
style.shape    = "Block"
style.blinking = "Always"
blink_interval = 500

# Colors (Kanagawa Dragon)
# Inspired in: https//github.com/rebelot/kanagawa.nvim

[colors.primary]
background = '#181616'
foreground = '#c5c9c5'

[colors.normal]
black = '#0d0c0c'
blue = '#8ba4b0'
cyan = '#8ea4a2'
green = '#8a9a7b'
magenta = '#a292a3'
red = '#c4746e'
white = '#C8C093'
yellow = '#c4b28a'

[colors.bright]
black = '#a6a69c'
blue = '#7FB4CA'
cyan = '#7AA89F'
green = '#87a987'
magenta = '#938AA9'
red = '#E46876'
white = '#c5c9c5'
yellow = '#E6C384'

[colors.selection]
background = '#2e2d2c'
foreground = '#c5c9c5'

[[colors.indexed_colors]]
index = 16
color = '#ffa066'

[[colors.indexed_colors]]
index = 17
color = '#ff5d62'

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
