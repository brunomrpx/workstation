# Use C-a as prefix, and C-a C-a sends prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g status-interval 1

# Vi keybindings
set -g status-keys vi
set -g mode-keys vi

# True color (importante para nvim)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Sem delay no Escape (importante para nvim)
set -sg escape-time 0

# Scrollback
set -g history-limit 10000

# Keybindings
bind -n C-x set synchronize-panes
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize vim-style
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window/pane indexing
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Reload config
bind R source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded."

# Mouse
set -g mouse on

# Activity notifications
set -g monitor-activity on
set -g visual-activity on

# Instant key response
set -g repeat-time 0

# Status bar on top and transparent
set -g status-position top
set -g status-style "bg=default,fg=#c5c9c5"

# Copy without jumping to bottom after leaving copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-selection

set -g status-left ""
set -g status-right-length 60
set -g status-right '#{?synchronize-panes,#[fg=#E69A9A]SYNC ,}#{?window_zoomed_flag,#[fg=#E6C384]ZOOM ,}#{?pane_in_mode,#[fg=#7AA89F]COPY ,}'

# Window list
set -g window-status-format " #[fg=#4e4d4c]#I #[fg=#4e4d4c]#W "
set -g window-status-current-format "#[fg=#2e2d2c,bg=default]#[bg=#2e2d2c,fg=#ffa066]#I #[fg=#c5c9c5,bold]#W#[bg=default,fg=#2e2d2c]"

# Pane borders
set -g pane-border-style "fg=#2e2d2c"
set -g pane-active-border-style "fg=#2e2d2c"
set -g pane-border-lines single

# Copy mode colors
setw -g mode-style "bg=#2e2d2c,fg=#c5c9c5"
# mode-selection-style requer tmux 3.5+ (apt tem 3.4)
# setw -g mode-selection-style "bg=#2e2d2c,fg=#c5c9c5"
set -g copy-mode-match-style "bg=#8ea4a2,fg=black"
set -g copy-mode-current-match-style "bg=#E6C384,fg=black,bold"

# Messages
set -g message-style "bg=default,fg=#938AA9"
set -g message-command-style "bg=default,fg=#c5c9c5"
